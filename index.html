<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legion TD — Web Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 30%, #1a2348 0%, #0b1020 70%, #070a14 100%);
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
    }
    /* elemen tersembunyi supaya font ke-load sebelum Phaser render */
    .font-preload { position: absolute; opacity: 0; pointer-events: none; }
    .font-preload .a { font-family: 'Orbitron'; font-weight: 900; }
    .font-preload .b { font-family: 'Rajdhani'; font-weight: 700; }
    #game-container {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(120,160,255,0.12);
    }
  </style>
</head>
<body>
  <div class="font-preload"><span class="a">x</span><span class="b">x</span></div>
  <div id="game-container"></div>
  <script type="module" src="/src/src/main.js"></script>
</body>
</html>
