<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b1020">
  <title>Legion TD — Web Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      position: fixed; overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #1a2348 0%, #0b1020 70%, #070a14 100%);
      font-family: 'Rajdhani', sans-serif;
      touch-action: none;                 /* matikan scroll/zoom gesture */
      -webkit-user-select: none; user-select: none;
      overscroll-behavior: none;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #game-container canvas {
      box-shadow: 0 12px 60px rgba(0,0,0,0.6);
      border-radius: 8px;
    }
    /* preload font supaya teks tidak pop-in */
    .font-preload { position: absolute; opacity: 0; pointer-events: none; }
    .font-preload .a { font-family: 'Orbitron'; font-weight: 900; }
    .font-preload .b { font-family: 'Rajdhani'; font-weight: 700; }
    /* overlay "putar ke landscape" untuk HP dalam mode portrait */
    #rotate {
      position: fixed; inset: 0; z-index: 9999; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: #0b1020; color: #cfe3ff; text-align: center; padding: 24px;
    }
    #rotate .ico { font-size: 72px; margin-bottom: 18px; animation: tilt 1.8s ease-in-out infinite; }
    #rotate .t { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; }
    #rotate .s { margin-top: 8px; font-size: 16px; color: #8fa6d8; }
    @keyframes tilt { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
    @media (orientation: portrait) and (max-width: 1024px) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div class="font-preload"><span class="a">x</span><span class="b">x</span></div>
  <div id="game-container"></div>
  <div id="rotate">
    <div class="ico">📱</div>
    <div class="t">Putar ke Mode Landscape</div>
    <div class="s">Game ini paling nyaman dimainkan secara horizontal</div>
  </div>
  <script>
    // cegah klik-kanan / callout long-press & zoom double-tap di HP
    window.addEventListener('contextmenu', e => e.preventDefault());
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap <= 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });
  </script>
  <script type="module" src="/src/src/main.js"></script>
</body>
</html>
